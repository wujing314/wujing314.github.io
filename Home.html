    <style>
        @tailwind base;
        @tailwind components;

        .mouse-cursor {
            position: fixed; left: 0; top: 0; pointer-events: none;
            border-radius: 50%; -webkit-transform: translateZ(0);
            transform: translateZ(0); visibility: hidden;
        }

        .cursor-outer {
            margin-left: -15px; margin-top: -15px;
            width: 30px; height: 30px; z-index: 50;
            border: 2px solid rgba(0, 0, 0, 0.5);
            box-sizing: border-box; opacity: .5;
            transition: all .08s ease-out;
        }

        .cursor-inner {
            margin-left: -3px; margin-top: -3px;
            width: 5px; height: 5px; z-index: 50;
            background-color: rgba(0, 0, 0, 0.5);
            transition: width .3s ease-in-out, height .3s ease-in-out, margin .3s ease-in-out, opacity .3s ease-in-out;
        }

        .cursor-outer.cursor-hover { opacity: 0; }
        .cursor-inner.cursor-hover {
            margin-left: -40px; margin-top: -40px;
            width: 80px; height: 80px;
            background-color: rgba(0, 0, 0, 0.5); opacity: .3;
        }

        @keyframes morph {
            0% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            50% { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; }
            100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
        }

        .animation-morph { animation: morph 8s ease-in-out infinite 1s }
        .page-mqx-width { max-width: 1300px; }
        .text-767676 { color: #767676; }
    </style>
</head>

<script>
    site_cursor();

    function toggleNav() { $('#mobileNav').slideToggle(500); }

    loadAllData()
        .then(data => {
            renderHomePage(data);
        })
        .catch(error => console.error('Error loading content:', error));

    function renderHomePage(data) {
        const profile = data.Home.profile;
        const social = data.Home.social || [];
        document.querySelector('.name h1').textContent = profile.name;
        document.querySelector('.info p').textContent = `${profile.school} | ${profile.class} | ${profile.title}`;
        document.querySelector('.social ul').innerHTML = social.map(item => `
            <li>
                <a href="${item.url}" title="${item.name}" target="_blank" rel="noopener noreferrer" class="hover:text-black dark:hover:text-white duration-300">
                    <i class="${item.icon} text-2xl"></i>
                </a>
            </li>
        `).join('');
    }
    
    function site_cursor() {
        const e = document.querySelector(".cursor-inner"), t = document.querySelector(".cursor-outer");
        e.style.visibility = "visible"; t.style.visibility = "visible";
        window.onmousemove = function(s) {
            t.style.transform = "translate(" + s.clientX + "px, " + s.clientY + "px)";
            e.style.transform = "translate(" + s.clientX + "px, " + s.clientY + "px)";
        };
        $("body").on("mouseenter", "a", function() {
            e.classList.add("cursor-hover"); t.classList.add("cursor-hover");
        });
        $("body").on("mouseleave", "a, .cursor-pointer", function() {
            $(this).is("a") && $(this).closest(".cursor-pointer").length || (e.classList.remove("cursor-hover"), t.classList.remove("cursor-hover"));
        });
    }

    function toggleSearch() { $('#search').toggle('.2'); }

    function toggleDarkMode() {
        var dark = window.localStorage.getItem('dark');
        dark = !dark || dark == 0 ? 1 : 0;
        window.localStorage.setItem('dark', dark);
        darkMode();
    }

    function darkMode() {
        var dark = window.localStorage.getItem('dark');
        if (!dark) return;
        if (dark == 1) $('html').addClass('dark');
        else $('html').removeClass('dark');
    }

    darkMode();

    $(function() {
        var url = location.href;
        $(".nav li a").each(function() {
            if ((url + '/').indexOf($(this).attr('href').replace('.html', '')) > -1 && $(this).attr('href').replace('.html', '') != '/') {
                $(this).addClass('text-black dark:text-white font-semibold tracking-wide');
            } else {
                $(this).removeClass('text-black dark:text-white font-semibold tracking-wide');
            }
        });
    });
</script>
